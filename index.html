<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Library System Login</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" id="theme-style" href="css/darkmode.css" disabled>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #varta-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1; 
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      position: relative;
      z-index: 2; 
      width: 100%;
      max-width: 370px;
      padding: 40px;
      border-radius: 14px; 
      text-align: center;
      
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);       
      -webkit-backdrop-filter: blur(12px); 
      border: 1px solid rgba(255, 255, 255, 0.15); 
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }
    
    .dark-theme .login-box,
    body[style*="darkmode"] .login-box {
      background: rgba(15, 17, 26, 0.45); 
      border: 1px solid rgba(255, 255, 255, 0.07);
    }

    .login-title { margin-bottom: 0.7em; color: var(--primary); }
    #loginMsg { min-height: 2em; }

    .login-links-container {
      display: flex;
      justify-content: space-between;
      margin-top: 1.2rem;
      font-size: 0.88rem;
    }

    .login-link {
      color: var(--primary, #4e73df);
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.2s ease;
    }

    .login-link:hover {
      text-decoration: underline;
      opacity: 0.85;
    }
  </style>
</head>
<body>

  <div id="varta-bg">
    
    <div class="login-box">
      <h2 class="login-title"><i class="fa-solid fa-book-open-reader"></i> Library LMS Login</h2>
      
      <form id="loginForm" autocomplete="off">
        <input type="text" id="username" placeholder="Username" autocomplete="username" required autofocus>
        <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
        <select id="userRole" required>
          <option value="" selected disabled>-- Role --</option>
          <option value="admin">Admin</option>
          <option value="user">User</option>
        </select>
        <br>
        <button type="submit" style="width:100%;">Login</button>
      </form>

      <div class="login-links-container">
        <a href="forgot-pass.html" class="login-link">Forgot Password?</a>
        <a href="register.html" class="login-link">Create Account</a>
      </div>

      <div id="loginMsg"></div>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.clouds.min.js"></script>
  
  <script>
    // Theme alignment engine hook matching your main layout rules
    if(localStorage.getItem('theme') === 'dark' || localStorage.getItem('darkMode') === 'yes') {
      document.getElementById('theme-style').disabled = false;
      document.body.classList.add('dark-theme');
    }

    if (document.getElementById('varta-bg')) {
      VANTA.CLOUDS({
        el: "#varta-bg",
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        minHeight: 200.00,
        minWidth: 200.00,
        skyColor: 0x1697ff,

      });
    }
  </script>

  <script src="js/auth.js"></script>
</body>
</html>
