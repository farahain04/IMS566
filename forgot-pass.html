<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Library System - Forgot Password</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" id="theme-style" href="css/darkmode.css" disabled>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #varta-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1; 
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      position: relative;
      z-index: 2; 
      width: 100%;
      max-width: 370px;
      padding: 40px;
      border-radius: 14px; 
      text-align: center;
      background: rgba(255, 255, 255, 0.08); 
      backdrop-filter: blur(12px);          
      -webkit-backdrop-filter: blur(12px);   
      border: 1px solid rgba(255, 255, 255, 0.15); 
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }
    
    .dark-theme .login-box {
      background: rgba(15, 17, 26, 0.45); 
      border: 1px solid rgba(255, 255, 255, 0.07);
    }

    .login-title { margin-bottom: 0.5em; color: var(--primary); }
    .subtitle { color: rgba(255,255,255,0.7); font-size:0.9rem; margin-bottom:1.5em; display:block;}
    #forgotMsg { min-height: 2em; margin-top: 10px; font-weight: 500; }

    .login-links-container {
      display: flex;
      justify-content: space-between;
      margin-top: 1.2rem;
      font-size: 0.88rem;
    }

    .login-link {
      color: var(--primary, #4e73df);
      text-decoration: none;
      font-weight: 500;
    }

    .login-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div id="varta-bg">
    <div class="login-box">
      <h2 class="login-title"><i class="fa-solid fa-key"></i> Reset Password</h2>
      <span class="subtitle">Enter your details to generate a recovery update.</span>
      
      <form id="forgotForm" autocomplete="off">
        <input type="text" id="forgotUsername" placeholder="Your Username" required autofocus>
        <input type="password" id="newPassword" placeholder="New Password" required>
        <br>
        <button type="submit" style="width:100%;">Update Password</button>
      </form>

      <div class="login-links-container">
        <a href="index.html" class="login-link">Back to Login</a>
        <a href="register.html" class="login-link">Register Account</a>
      </div>

      <div id="forgotMsg"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.clouds.min.js"></script>
  
  <script>
    if(localStorage.getItem('theme') === 'dark' || localStorage.getItem('darkMode') === 'yes') {
      document.getElementById('theme-style').disabled = false;
      document.body.classList.add('dark-theme');
    }

    VANTA.CLOUDS({
        el: "#varta-bg",
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        minHeight: 200.00,
        minWidth: 200.00,
        skyColor: 0x1697ff,          
    });

    // Password reset simulation logic matching local storage context structures
    document.getElementById('forgotForm').onsubmit = function(e) {
      e.preventDefault();
      const msg = document.getElementById('forgotMsg');
      
      const username = document.getElementById('forgotUsername').value.trim();
      const newPass = document.getElementById('newPassword').value;

      let users = JSON.parse(localStorage.getItem('users') || '[]');
      
      // Look for user index item matching entry text credentials
      let userIdx = users.findIndex(u => u.username.toLowerCase() === username.toLowerCase());

      if(userIdx === -1) {
        msg.style.color = '#dc3545';
        msg.textContent = "Username not found in system records!";
        return;
      }

      users[userIdx].password = newPass;
      localStorage.setItem('users', JSON.stringify(users));

      msg.style.color = '#26a69a';
      msg.textContent = "Password updated successfully! Redirecting...";
      
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 2000);
    };
  </script>
</body>
</html>
